{%load bootstrap5 %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    {% bootstrap_css %}
  </head>


  <body>
    <div class="table-responsive container">
      <h1>Lista de Produtos</h1>
      <div class="mb-3">
        <a href="{% url 'urlSair' %}" class="btn btn-danger">Sair</a>
      </div>
      <table class="table table-primary table-hover">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Preço</th>
                <th>Qtde</th>
                <th>Data</th>
                <th>Descrição</th>
                <th>Editar</th>
                <th>Excluir</th>
            </tr>
        </thead>
        <tbody>
        
            {% for p in produtos%}
            <tr>
                <td>{{p.nome}}</td>
                <td>{{p.preco}}</td>
                <td>{{p.qtde}}</td>
                <td>{{p.data}}</td>
                <td>{{p.descricao}}</td>
                <td>
                    <form action="{% url 'urleditarProduto' p.id %}" method="GET">
                        {% csrf_token %}
                        <input type="submit" value="Editar" class="btn btn-primary">
                    </form>
                </td>

                <td>
                    <form action="{% url 'urlexcluirProduto' p.id %}" method="POST">
                        {% csrf_token %}
                    <input type="submit" value="Excluir" class="btn btn-danger">
                </form>
                </td>
            </tr>
            {% endfor %}
          </tr>
        </tbody>
      </table>
      <form action="{% url 'urlcadastrarProduto' %}" method="POST">
        {% csrf_token %}
        <input type="submit" value="Novo Produto" class="btn btn-primary" />
      </form>
    </div>
  </body>
</html>
