{%load bootstrap5 %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto</title>
    {% bootstrap_css %}
</head>
<body>
    <div class="container">

        <h1>Cadastro de Produto</h1>
        <form action="{% url 'urlsalvarProduto' %}" method="post">
            {% csrf_token %}
        <input type="text" name="txtNome" placeholder="Digite o nome do produto..." class="form-control" id="">
        
        <input type="number" name="txtPreco" placeholder="Digite o preço do produto..." class="form-control" id="">
        
        <input type="number" name="txtQtde" placeholder="Digite a quantidade..." class="form-control" id="">
        
        <input type="text" name="txtDescricao" placeholder="Digite a descricao do produto..." class="form-control" id="">
        
        <input type="date" name="txtData" placeholder="Digite a data de compra..." class="form-control" id="">

      
            <input type="submit" value="Salvar" class="btn btn-success">
        </form>

    </div>
</body>
</html>
