{% extends 'global/base.html' %}

{% block title %}
    Carrinho
{% end title %}

{% block title %}
    {%if carrinho %}
    
        <table>
            <thead>
                <tr>

                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Qtde</th>
                    <th>Total</th>
                    <th>Ação</th>

                </tr>
            </thead>
            <tbody>
                {% for item in carrinho %}
                <tr>
                    <td>{{ item.produto.nome }}</td>
                    
                    <td>{{ item.preco }}</td>
                    
                    <td>{{ item.qtde}}</td>
                    
                    <td>{{ item.total }}</td>

                    <td><a href="{% url 'urlremover_carrinho ' %}"></a></td>

                </tr>
            </tbody>

        </table>

{% block title %}
